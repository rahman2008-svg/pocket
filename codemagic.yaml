workflows:
  android-build:
    name: Pocket React Native APK

    environment:
      node: 22.21.0
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/.npm
        - ~/.yarn

    scripts:
      - name: Install dependencies
        script: yarn install --frozen-lockfile

      - name: Clean Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew clean

      - name: Build APK
        script: |
          cd android
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/**/*.aab
