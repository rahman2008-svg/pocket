name: QuantumMind AI Release APK

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: false
        default: "patch"

jobs:
  build_android:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: |
          yarn install || npm install

      # 5️⃣ Give permission to Gradle
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 6️⃣ Clean build
      - name: Clean project
        run: |
          cd android
          ./gradlew clean

      # 7️⃣ Build Release APK
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease

      # 8️⃣ Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuantumMind-AI-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      # 9️⃣ (Optional) Create Git Tag
      - name: Create Git Tag
        run: |
          echo "Creating tag..."
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v1.0.${{ github.run_number }}
          git push origin --tags
